# local 환경 (기본값)
spring:
  profiles:
    default: local
  datasource:
    url: jdbc:mysql://localhost:3306/mydb
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.springframework.cache: trace

---
# prod 환경 (AWS 운영 환경)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # 제공된 RDS 엔드포인트 및 SSL 설정을 기반으로 한 구성
    url: jdbc:mysql://instagram-db.czu462om0ew0.ap-northeast-2.rds.amazonaws.com:3306/mydb?useSSL=true&verifyServerCertificate=true&trustCertificateKeyStoreUrl=file:/certs/global-bundle.pem&sslMode=VERIFY_IDENTITY
    username: admin
    password: ${DB_PASSWORD} # 실행 시 환경 변수로 주입 권장 (-DDB_PASSWORD=...)
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none # 운영 환경에서는 none 또는 validate 권장
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
